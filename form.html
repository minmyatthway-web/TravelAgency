<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 w-full min-h-screen flex flex-col items-center justify-center">
    <main class="bg-white rounded-2xl shadow-2xl p-4 sm:p-8 w-[95%] max-w-lg">
        <div class="flex flex-col items-center justify-center ">
            <img src="iconn.png" alt="" class="w-14 h-14 mb-4 bg-blue-100 rounded-xl p-4">
            <h1 class="text-2xl font-extrabold mb-2 ">Create Account</h1>
            <p class="text-xs text-gray-500">Join us today! It only takes a minute.</p>
        </div>
        <form action="" class="mt-8 max-w-md grid grid-cols-1 gap-4 px-2 ">
            <section class="grid sm:grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <div class="flex flex-col gap-2">
                    <label for="" class="text-xs font-medium">Full Name</label>
                    <input type="text" class="w-full border border-gray-300 rounded-lg p-3 bg-slate-100 text-xs font-normal"
                        placeholder="John Doe">
                </div>
                <div class="flex flex-col gap-2">
                    <label for="" class= "text-xs font-medium">Email Address</label>
                    <input type="text" class="w-full border border-gray-300 rounded-lg p-3 bg-slate-100 text-xs font-normal"
                        placeholder="name@company.com">
                </div>
            </section>
            <section class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label for="" class="text-xs font-medium">Password</label>
                    <input type="text" class="w-full border border-gray-300 rounded-lg p-3 bg-slate-100 text-xs font-normal"
                        placeholder="........">
                </div>
                <div class="flex flex-col gap-2">
                    <label for="" class="text-xs font-medium">Confirm Password</label>
                    <input type="text" class="w-full border border-gray-300 rounded-lg p-3 bg-slate-100 text-xs font-normal"
                        placeholder="........">
                </div>
            </section>
            <div class="flex items-start text-xs gap-2">
                <input type="checkbox" id="terms">
                <p>I agree to the <a href="#" class="font-semibold text-blue-700 underline ">Terms of Service</a>
                and <a href="#" class="font-semibold text-blue-700 underline">Privacy Policy.</a></p>
            </div>
            <button class="bg-blue-500 rounded-lg p-3 text-white text-sm shadow-lg font-bold hover:bg-blue-400">Create
                My Account >></button>
        </form>
        <div class="flex justify-center text-center mt-6">
            <p class="text-xs text-gray-500 ">Already have an account?
            <a href="#" class="text-blue-700 text-xs font-bold">Sign in here</a></p>
        </div>

    </main>

</body>

</html>
