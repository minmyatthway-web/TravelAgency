<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 w-full min-h-screen flex flex-col items-center justify-center">
    <main class=" bg-white rounded-2xl shadow-2xl p-8 w-full sm:p-8 w-[95%] max-w-lg">
        <div class="flex flex-col items-center justify-center ">
            <img src="locked.png" alt="" class="w-14 h-14 mb-4 bg-blue-100 rounded-xl p-4">
            <h1 class="text-2xl font-extrabold mb-2 ">Welcome Back</h1>
            <p class="text-xs text-gray-500">Enter your credentials to access your account</p>
        </div>
        <form action="" class="mt-8 max-w-md flex flex-col gap-4  px-2">
            <section class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label for="" class="text-xs font-medium">Email Address</label>
                    <input type="password"
                        class="border border-gray-300 rounded-lg p-3 bg-slate-100 text-xs font-normal"
                        placeholder="name@company.com">
                </div>
                <div class="flex flex-col gap-2">
                    <label for="" class="text-xs font-medium">Password</label>
                    <input type="password"
                        class="border border-gray-300 rounded-lg p-3 bg-slate-100 text-sm font-normal"
                        placeholder="........">
                </div>
            </section>
            <section class="flex flex-row items-center justify-between gap-6 text-xs">
                <div class="flex  gap-2">
                    <input type="checkbox">
                    <p>Remember me</p>
                </div>
                <div>
                    <a href="#" class="text-blue-700 font-semibold">Forget Password?</a>
                </div>
            </section>
            <button class="bg-blue-500 rounded-lg p-3 text-white text-sm shadow-lg font-bold hover:bg-blue-400">Log In ➡️</button>
        </form>
        <div class="flex justify-center text-center mt-6">
            <p class="text-xs text-gray-500 ">Don't have an account yet?
            <a href="#" class="text-blue-700 text-xs font-bold">Sign up for free</a></p>
        </div>
    </main>
</body>

</html>
